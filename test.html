<!doctype　HTML>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <title>STEP3 テスト</title>
        <link rel="stylesheet" href="test.css">
    </head>

    <body>

    <div class="container">
        <!---ヘッダー--->
        <header class="header">
            <h2>世界一甘いお店</h2>
        </header>

        <!---メイン--->
        <div class="main-area">

            <!---サイドバー--->
            <nav class="sidebar">
                <ul>
                    <li><a href="#">トップ</a></li>
                    <li><a href="#">新着情報</a></li>
                    <li><a href="#">おすすめのスイーツ</a></li>
                    <li><a href="#">お問い合わせ</a></li>
                </ul>
            </nav>

            <!---メインコンテンツ--->
            <main class="main">
                <form>
                    <table border="1">
                        <tr>
                            <th>お名前</th>
                            <td>
                                <input type="text" size="40">
                            </td>
                        </tr>

                        <tr>
                            <th>お近くのお店</th>
                            <td>
                                <select>
                                    <option>北海道・東北</option>
                                    <option>関東</option>
                                    <option>中部</option>
                                    <option>関西</option>
                                    <option>中国・四国</option>
                                    <option>九州・沖縄</option>
                                </select>
                            </td>
                        </tr>

                        <tr>
                            <th>電話番号</th>
                            <td>
                                <input type="text" size="40">
                            </td>
                        </tr>

                        <tr>
                            <th>メールアドレス</th>
                            <td>
                                <input type="text" size="40">
                            </td>
                        </tr>

                        <tr>
                            <th>お問い合わせ種別</th>
                            <td>
                                <input type="radio" name="type">商品について
                                <input type="radio" name="type">従業員について
                            </td>
                        </tr>

                        <tr>
                            <th>お問い合わせ内容</th>
                            <td>
                                <textarea cols="30" rows="5" placeholder="詳細を入力してください"></textarea>
                            </td>
                        </tr>
                    </table>
                    <div class="button-area">
                        <input type="submit" value="送信">
                    </div>
                </form>
            </main>
        </div>

        <!---フッター--->
        <footer class="footer">
        </footer>
    </div>
</body>
</html>
